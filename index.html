<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traductor en Tiempo Real</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.9rem 1.5rem;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #111;
    }

    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 99px;
      background: #e5e5e5;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .badge.live {
      background: #dcfce7;
      color: #16a34a;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .divider {
      width: 1px;
      background: #ddd;
      grid-row: 1;
      grid-column: 1 / span 2;
      display: none;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #ffffff;
      border-right: 2px solid #e0e0e0;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 0.6rem 1.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      font-weight: 700;
      background: #f9f9f9;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      font-size: 1.15rem;
      line-height: 1.8;
      font-weight: 500;
    }

    .segment {
      margin-bottom: 0.6rem;
    }

    .segment.final {
      color: #111111;
      font-weight: 600;
    }

    .segment.interim {
      color: #999;
      font-weight: 400;
    }

    .translation .segment.final {
      color: #15803d;
      font-weight: 700;
    }

    .translation .segment.interim {
      color: #86efac;
      font-weight: 400;
    }

    .placeholder {
      color: #bbb;
      font-size: 0.9rem;
      margin-top: 2rem;
      text-align: center;
      font-weight: 400;
    }

    .error-bar {
      background: #fef2f2;
      color: #dc2626;
      padding: 0.65rem 1.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      border-top: 1px solid #fecaca;
      display: none;
      flex-shrink: 0;
    }

    footer {
      padding: 0.9rem 1.5rem;
      background: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      flex-shrink: 0;
    }

    .mic-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .mic-dot.active {
      background: #ef4444;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    button {
      padding: 0.55rem 1.4rem;
      border-radius: 99px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #startBtn {
      background: #16a34a;
      color: #fff;
      min-width: 90px;
    }
    #startBtn:hover { background: #15803d; }
    #startBtn.active {
      background: #ef4444;
      color: #fff;
    }
    #startBtn.active:hover { background: #dc2626; }

    #clearBtn {
      background: #e5e5e5;
      color: #555;
    }
    #clearBtn:hover { background: #d4d4d4; color: #333; }

    .status-text {
      font-size: 0.78rem;
      color: #aaa;
      font-weight: 500;
      flex: 1;
      text-align: right;
    }

    /* Scrollbar */
    .transcript::-webkit-scrollbar { width: 4px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>Traductor en Tiempo Real &nbsp;🎙</h1>
  <span class="badge" id="badge">Listo</span>
</header>

<main>
  <div class="panel" id="origPanel">
    <div class="panel-header">🇺🇸 &nbsp;Inglés — original</div>
    <div class="transcript" id="origTranscript">
      <div class="placeholder" id="origPlaceholder">Presioná <strong>Iniciar</strong> y hablá cerca del micrófono</div>
    </div>
  </div>

  <div class="panel translation" id="transPanel">
    <div class="panel-header">🇪🇸 &nbsp;Español — traducción</div>
    <div class="transcript" id="transTranscript">
      <div class="placeholder" id="transPlaceholder">La traducción aparecerá acá</div>
    </div>
  </div>
</main>

<div class="error-bar" id="errorBar"></div>

<footer>
  <span class="mic-dot" id="micDot"></span>
  <button id="startBtn" onclick="toggle()">Iniciar</button>
  <button id="clearBtn" onclick="clearAll()">Limpiar</button>
  <span class="status-text" id="statusText">Chrome o Edge recomendado</span>
</footer>

<script>
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;
  let debounceTimer = null;

  // Current interim DOM nodes
  let interimOrig = null;
  let interimTrans = null;

  // ── UI helpers ────────────────────────────────────────────────────────────

  function setUI(listening) {
    const btn = document.getElementById('startBtn');
    const dot = document.getElementById('micDot');
    const badge = document.getElementById('badge');
    const status = document.getElementById('statusText');

    btn.textContent = listening ? 'Detener' : 'Iniciar';
    btn.classList.toggle('active', listening);
    dot.classList.toggle('active', listening);
    badge.textContent = listening ? 'En vivo' : 'Listo';
    badge.classList.toggle('live', listening);
    status.textContent = listening ? 'Escuchando inglés…' : 'Chrome o Edge recomendado';
  }

  function showError(msg) {
    const bar = document.getElementById('errorBar');
    bar.textContent = msg;
    bar.style.display = 'block';
  }

  function hidePlaceholders() {
    document.getElementById('origPlaceholder').style.display = 'none';
    document.getElementById('transPlaceholder').style.display = 'none';
  }

  function scrollBoth() {
    const o = document.getElementById('origTranscript');
    const t = document.getElementById('transTranscript');
    o.scrollTop = o.scrollHeight;
    t.scrollTop = t.scrollHeight;
  }

  // ── Segment management ────────────────────────────────────────────────────

  function appendFinal(origText) {
    clearInterim();
    if (!origText.trim()) return;

    hidePlaceholders();

    const oEl = document.createElement('div');
    oEl.className = 'segment final';
    oEl.textContent = origText.trim();
    document.getElementById('origTranscript').appendChild(oEl);

    const tEl = document.createElement('div');
    tEl.className = 'segment final';
    tEl.textContent = '…';
    document.getElementById('transTranscript').appendChild(tEl);

    scrollBoth();
    translate(origText.trim(), tEl);
  }

  function updateInterim(text) {
    if (!text.trim()) return;
    hidePlaceholders();

    if (!interimOrig) {
      interimOrig = document.createElement('div');
      interimOrig.className = 'segment interim';
      document.getElementById('origTranscript').appendChild(interimOrig);
    }
    if (!interimTrans) {
      interimTrans = document.createElement('div');
      interimTrans.className = 'segment interim';
      document.getElementById('transTranscript').appendChild(interimTrans);
    }

    interimOrig.textContent = text.trim();
    scrollBoth();

    // Debounce interim translation to avoid hammering the API
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => translate(text.trim(), interimTrans), 700);
  }

  function clearInterim() {
    clearTimeout(debounceTimer);
    if (interimOrig) { interimOrig.remove(); interimOrig = null; }
    if (interimTrans) { interimTrans.remove(); interimTrans = null; }
  }

  // ── Translation ───────────────────────────────────────────────────────────

  async function translate(text, targetEl) {
    if (!text || !targetEl || !targetEl.isConnected) return;
    try {
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q='
        + encodeURIComponent(text);
      const res = await fetch(url);
      const data = await res.json();
      if (targetEl.isConnected) {
        // Response is nested array: [[["translated","original",...],...],...]
        const translated = data[0].map(chunk => chunk[0]).filter(Boolean).join('');
        targetEl.textContent = translated;
        scrollBoth();
      }
    } catch (_) {
      // silent — translation is best-effort
    }
  }

  // ── Speech recognition ────────────────────────────────────────────────────

  let restarting = false;

  function buildRecognition() {
    // Destroy previous instance cleanly before creating a new one
    if (recognition) {
      try { recognition.onend = null; recognition.onerror = null; recognition.abort(); } catch (_) {}
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = (e) => {
      let interim = '';
      let final = '';

      for (let i = e.resultIndex; i < e.results.length; i++) {
        const r = e.results[i];
        if (r.isFinal) final += r[0].transcript + ' ';
        else interim += r[0].transcript;
      }

      if (final.trim()) appendFinal(final);
      else if (interim) updateInterim(interim);
    };

    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') {
        showError('Permiso de micrófono denegado. Habilitalo en la configuración del navegador.');
        stop();
      }
      // All other errors (no-speech, network, aborted): let onend handle restart
    };

    // onend always fires after stop/error/silence — rebuild and restart immediately
    recognition.onend = () => {
      if (!isListening || restarting) return;
      restarting = true;
      // Small delay prevents "already started" race condition
      setTimeout(() => {
        restarting = false;
        if (isListening) {
          buildRecognition();
          try { recognition.start(); } catch (_) {
            // If it still fails, retry once more after 300ms
            setTimeout(() => { if (isListening) { buildRecognition(); try { recognition.start(); } catch(_) {} } }, 300);
          }
        }
      }, 150);
    };
  }

  function start() {
    if (!SpeechRecognition) {
      showError('Tu navegador no soporta la Web Speech API. Usá Google Chrome o Microsoft Edge.');
      return;
    }
    isListening = true;
    restarting = false;
    setUI(true);
    buildRecognition();
    try {
      recognition.start();
    } catch (e) {
      showError('No se pudo iniciar el micrófono: ' + e.message);
      isListening = false;
      setUI(false);
    }
  }

  function stop() {
    isListening = false;
    restarting = false;
    clearInterim();
    if (recognition) {
      try { recognition.onend = null; recognition.abort(); } catch (_) {}
    }
    setUI(false);
  }

  function toggle() {
    isListening ? stop() : start();
  }

  function clearAll() {
    stop();
    document.getElementById('origTranscript').innerHTML =
      '<div class="placeholder" id="origPlaceholder">Presioná <strong>Iniciar</strong> y hablá cerca del micrófono</div>';
    document.getElementById('transTranscript').innerHTML =
      '<div class="placeholder" id="transPlaceholder">La traducción aparecerá acá</div>';
    document.getElementById('errorBar').style.display = 'none';
  }
</script>
</body>
</html>
